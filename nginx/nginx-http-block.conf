# ============================================================
# nginx/nginx-http-block.conf
# 追加到 /etc/nginx/nginx.conf 的 http {} 块中
#
# 这些定义必须放在 http {} 层级（不能放 server/location）
# ============================================================

# ── 限流区域 ─────────────────────────────────────────
# 请求速率限制 (10MB 共享内存 ≈ 16 万 IP)
limit_req_zone $binary_remote_addr zone=opencode_req:10m rate=10r/m;

# 并发连接限制
limit_conn_zone $binary_remote_addr zone=opencode_conn:10m;

# Session 创建限流（更严格：每 IP 每分钟 3 次创建）
limit_req_zone $binary_remote_addr zone=opencode_create:10m rate=3r/m;

# ── 上游共享内存区（worker 间共享健康检查状态）──────
# 注：upstream 块中也需要 zone 定义，两者配合使用
# 此处不需要额外 zone 定义，在 server 块的 upstream 中定义即可

# ── 全局超时（可选覆盖）──────────────────────────────
# proxy_read_timeout 和 proxy_connect_timeout 在 location 中单独设置
# 此处设全局默认值作为兜底：
proxy_connect_timeout 10s;
proxy_read_timeout 120s;
proxy_send_timeout 30s;

# ── 日志格式 ─────────────────────────────────────────
# 已在 opencode-upstream.conf 的 server 块中定义
# 如需全局使用，可在此定义：
log_format opencode_json escape=json
    '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":$upstream_status,'
        '"upstream_response_time":"$upstream_response_time"'
    '}';
