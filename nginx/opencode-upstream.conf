# ============================================================
# nginx/opencode-upstream.conf
# OpenCode Serve 接入层 — 并发控制 / 限流 / 负载均衡 / TLS
#
# 部署:
#   1. 放到 /etc/nginx/sites-enabled/opencode
#   2. nginx -t && systemctl reload nginx
#
# 前提:
#   - 每台部署机运行 opencode serve --port 4096 (systemd/NSSM)
#   - nginx >= 1.18 (支持 $ssl_preread_protocol 等)
# ============================================================

# ── 限流定义 (http 块) ──────────────────────────────────
# 需要放到 /etc/nginx/nginx.conf 的 http {} 块中
#
# limit_req_zone $binary_remote_addr zone=opencode_req:10m rate=10r/m;
# limit_conn_zone $binary_remote_addr zone=opencode_conn:10m;
# limit_req_zone $binary_remote_addr zone=opencode_create:10m rate=3r/m;

# ── 上游服务器组 ──────────────────────────────────────
upstream opencode_backend {
    # 共享内存区（worker 间共享健康检查状态）
    zone opencode_upstream 64k;

    # 最少连接算法（适合长任务场景）
    least_conn;

    # 后端实例
    # 方式 A：同机多实例（不同端口）
    server 127.0.0.1:4096 max_fails=3 fail_timeout=30s weight=5;
    server 127.0.0.1:4097 max_fails=3 fail_timeout=30s weight=3;
    server 127.0.0.1:4098 max_fails=3 fail_timeout=30s weight=2;

    # 方式 B：跨机实例（网络可达）
    # server 192.168.1.10:4096 max_fails=3 fail_timeout=10s;
    # server 192.168.1.11:4096 max_fails=3 fail_timeout=10s;

    # 长连接复用
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# ── HTTP Server ──────────────────────────────────────
server {
    listen 80;
    server_name opencode.yourcompany.com;

    # 强制 HTTPS（生产环境推荐）
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name opencode.yourcompany.com;

    # ── TLS ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/opencode.yourcompany.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opencode.yourcompany.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── 全局限流 ─────────────────────────────────────
    # 每 IP 每分钟最多 10 次请求（防止冲击）
    limit_req zone=opencode_req burst=20 nodelay;
    # 每 IP 最多 3 个并发连接
    limit_conn opencode_conn 3;

    # ── 日志 (JSON 格式便于采集) ─────────────────────
    log_format opencode_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_status":$upstream_status,'
            '"upstream_response_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent"'
        '}';
    access_log /var/log/nginx/opencode-access.log opencode_json;
    error_log  /var/log/nginx/opencode-error.log  warn;

    # ── 客户端请求体限制 ─────────────────────────────
    client_max_body_size 10m;           # 任务文件 + 附件上限
    client_body_timeout 30s;
    client_header_timeout 10s;

    # ── 健康检查端点（无需限流 + 无缓存）─────────────
    location = /healthz {
        return 200 "OK";
        add_header Content-Type text/plain;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        access_log off;
    }

    # ── API 端点 (opencode serve REST API) ──────────
    location / {
        # 上游路由
        proxy_pass http://opencode_backend;

        # HTTP/1.1 长连接
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 真实 IP 透传
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── SSE 流式输出支持（关键）─────────────────
        # opencode serve 的 /session/{id}/event 返回 SSE 流
        # nginx 默认缓冲会阻止 SSE 实时推送
        proxy_buffering off;
        proxy_cache off;

        # 对于非 SSE 请求，可选择性开启缓冲
        # 但为简单起见，全部关闭（opencode 流量不大）
        # proxy_buffering on;
        # proxy_buffer_size 4k;
        # proxy_buffers 8 4k;

        # ── 超时（匹配 AI 长任务）───────────────────
        proxy_connect_timeout 10s;       # 连接后端超时
        proxy_read_timeout 600s;         # 等待后端响应超时（10 分钟）
        proxy_send_timeout 60s;          # 发送请求体超时

        # ── 后端错误处理 ─────────────────────────────
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;

        # ── CORS（可选：如果浏览器直接调用）──────────
        # add_header Access-Control-Allow-Origin *;
        # add_header Access-Control-Allow-Methods 'GET, POST, DELETE, OPTIONS';
        # add_header Access-Control-Allow-Headers 'Content-Type, Authorization';
    }

    # ── Session 创建专用限流（更严格）────────────────
    location = /session {
        # 每 IP 每分钟最多 3 次创建（防止滥用）
        limit_req zone=opencode_create burst=5 nodelay;

        proxy_pass http://opencode_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # ── Session 中断（不限流，紧急操作）──────────────
    location ~ ^/session/[^/]+/abort$ {
        proxy_pass http://opencode_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # ── SSE 事件流（专用配置，确保不缓冲）───────────
    location ~ ^/session/[^/]+/event$ {
        proxy_pass http://opencode_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE 三件套：不缓冲 / 不缓存 / 长超时
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;

        # 告诉客户端这是 SSE
        add_header X-Accel-Buffering no;
        add_header Cache-Control no-cache;
        add_header Content-Type text/event-stream;

        # 关闭 gzip（SSE 不需要压缩）
        gzip off;
    }

    # ── API 文档（可公开访问）───────────────────────
    location = /docs {
        proxy_pass http://opencode_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }
}

